{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-[75vh] grid place-items-center py-10">
    <div class="w-full max-w-sm">
        <div class="flex flex-col items-center mb-6">
            <img src="{% static 'img/logo.png' %}" alt="" class="h-14 w-14 opacity-90 mb-3" aria-hidden="true">
            <div class="eyebrow">// auth · login</div>
        </div>

        <div class="card p-6">
            <h1 class="text-lg font-semibold text-slate-100 mb-1">Entrar</h1>
            <p class="text-xs text-slate-400 mb-5">Acesse sua conta para ver seu progresso.</p>

            {% if error %}
                <div class="mb-4 rounded-md border-l-2 border-l-[color:var(--danger)] border-y border-r border-[color:var(--border)] bg-[color:var(--surface-2)] px-3 py-2 text-xs text-rose-200">
                    {{ error }}
                </div>
            {% endif %}

            <form method="post" class="space-y-3.5">
                {% csrf_token %}
                {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
                <div>
                    <label for="login-username" class="label">username</label>
                    <input id="login-username" type="text" name="username" autocomplete="username" autofocus class="input font-mono" spellcheck="false">
                </div>
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label for="login-password" class="label mb-0">senha</label>
                        <button type="button" data-toggle-pw="login-password" class="text-[10px] text-slate-400 hover:text-[color:var(--accent)] font-mono uppercase tracking-wider">mostrar</button>
                    </div>
                    <input id="login-password" type="password" name="password" autocomplete="current-password" class="input font-mono">
                </div>
                <button type="submit" class="btn btn-primary w-full mt-2">
                    Entrar
                    <svg viewBox="0 0 20 20" class="h-3.5 w-3.5" fill="currentColor"><path d="M7.05 4.55a.75.75 0 011.06 0l4.5 4.5a.75.75 0 010 1.06l-4.5 4.5a.75.75 0 11-1.06-1.06L11 10 7.05 6.05a.75.75 0 010-1.06z"/></svg>
                </button>
            </form>

            <hr class="divider-dotted my-5">

            <div class="text-center text-xs text-slate-400">
                Não tem conta? <a href="{% url 'signup' %}" class="text-[color:var(--accent)] hover:text-indigo-300">Criar conta</a>
            </div>
        </div>
    </div>
</div>

<script>
document.querySelectorAll('[data-toggle-pw]').forEach(btn => {
    btn.addEventListener('click', () => {
        const id = btn.getAttribute('data-toggle-pw');
        const inp = document.getElementById(id);
        if (!inp) return;
        const showing = inp.type === 'text';
        inp.type = showing ? 'password' : 'text';
        btn.textContent = showing ? 'mostrar' : 'ocultar';
    });
});
</script>
{% endblock %}
